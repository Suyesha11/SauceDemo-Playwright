name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # API tests — fast, run on every PR
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npx playwright test --project=api-tests
        env:
          CI: true

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: playwright-report/
          retention-days: 7

  # UI tests — slower, only run on main branch pushes
  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Get installed Playwright version (used as part of cache key)
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm list @playwright/test --depth=0 --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      # Cache Playwright browser binaries
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      # Install browsers only if cache wasn't restored
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # If cache hit, only install OS deps (browsers are already cached)
      - name: Install OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run UI tests
        run: npx playwright test --project=ui-tests
        env:
          CI: true

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-report
          path: playwright-report/
          retention-days: 7