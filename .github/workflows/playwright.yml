name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npx playwright test --project=api-tests
        env:
          CI: true
        continue-on-error: true   # Let workflow continue so we publish report even on failure

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/
          retention-days: 7

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm list @playwright/test --depth=0 --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run UI tests
        run: npx playwright test --project=ui-tests
        env:
          CI: true
        continue-on-error: true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results/
          retention-days: 7

  # Publishes a unified Allure report to GitHub Pages
  publish-allure-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (required by Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline --save-dev
          allure --version

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          path: downloaded-results
          pattern: allure-results-*
          merge-multiple: true

      - name: Move results to allure-results folder
        run: |
          mkdir -p allure-results
          mv downloaded-results/* allure-results/ 2>/dev/null || true
          ls -la allure-results/

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy previous history (if exists)
        run: |
          if [ -d "gh-pages/last-history" ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/last-history/* allure-results/history/
            echo "Previous history copied successfully"
          else
            echo "No previous history found — first run"
          fi

      - name: Generate Allure report
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Preserve history for next run
        run: |
          mkdir -p allure-history
          if [ -d "gh-pages" ] && [ "$(ls -A gh-pages 2>/dev/null)" ]; then
            cp -r gh-pages/* allure-history/ 2>/dev/null || true
          fi
          # Add the new report
          BUILD_NUMBER=${{ github.run_number }}
          mkdir -p allure-history/$BUILD_NUMBER
          cp -r allure-report/* allure-history/$BUILD_NUMBER/
          # Save current report's history for the next run
          mkdir -p allure-history/last-history
          cp -r allure-report/history/* allure-history/last-history/ 2>/dev/null || true
          # Create root index.html that redirects to latest report
          echo "<meta http-equiv=\"refresh\" content=\"0; url=./$BUILD_NUMBER/\" />" > allure-history/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: false
